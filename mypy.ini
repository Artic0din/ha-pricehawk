[mypy]
files = custom_components/pricehawk
explicit_package_bases = True
namespace_packages = True
# custom_components/ is not a package; treat `pricehawk` as the import root.
mypy_path = custom_components

# Home Assistant is not a typed pip dependency we control. The test harness
# pins it (via pytest-homeassistant-custom-component) to an old release whose
# stubs lag the APIs our code targets at runtime, so analysing HA internals
# produces false positives (OptionsFlowWithReload, SelectorOptionsType, ...).
# `follow_imports = skip` treats every `homeassistant.*` symbol as Any —
# the correct mypy boundary for a HACS integration. Our own logic still gets
# full type-checking; HA API correctness is validated at runtime inside HA.
[mypy-homeassistant.*]
follow_imports = skip
ignore_missing_imports = True

# Same rationale for the OpenElectricity SDK — third-party, untyped.
[mypy-openelectricity.*]
follow_imports = skip
ignore_missing_imports = True
