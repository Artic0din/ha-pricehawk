[mypy]
# Scope: type-check the custom_component itself. Tests + scripts are out of scope
# until #176 (HA stubs install, drop --ignore-missing-imports) lands.
files = custom_components/pricehawk
ignore_missing_imports = True
explicit_package_bases = True
namespace_packages = True
# Treat `pricehawk` as the package root (custom_components/ is not a package).
mypy_path = custom_components

# config_flow.py drowns under unstubbed HA selector / OptionsFlow types. Skip
# until #176 installs pytest-homeassistant-custom-component (HA stubs), at which
# point this section must be removed and the file re-included.
[mypy-custom_components.pricehawk.config_flow]
ignore_errors = True
