analyze_csv:
  name: Analyze Amber CSV
  description: >-
    Compare Amber Electric usage data against your configured GloBird rates.
    Called from the PriceHawk dashboard with pre-parsed CSV rows.
  fields:
    rows:
      name: CSV Rows
      description: >-
        Parsed CSV data as a list of row objects. Each object must contain:
        day, start_time, channel_type, price, usage, cost.
      required: true
      selector:
        object:

backfill_history:
  name: Backfill History
  description: >-
    Replay HA recorder grid-power history through the current CDR plan
    and top-K ranked alternatives, populating daily cost history for the
    last N days. Capped by HA recorder retention (typically 10 days
    unless ``purge_keep_days`` is raised). Status surfaces on
    ``sensor.pricehawk_backfill_status``.
  fields:
    days:
      name: Days to backfill
      description: Number of days of history to recover (max 90)
      required: false
      default: 30
      example: 30
      selector:
        number:
          min: 1
          max: 90
          mode: slider

reset_today:
  name: Reset Today's Cost
  description: >-
    Zero every provider's daily accumulators (import_kwh_today,
    import_cost_today_c, export_*_today, etc.) on every PriceHawk entry,
    then persist state. Use after a code-level cost fix lands mid-day to
    clear residual values without waiting for midnight rollover.

rank_alternatives:
  name: Rank Alternative Plans
  description: >-
    Run the cheap-rank pipeline against your current retailer + competitor
    retailers (AGL, Origin, EnergyAustralia, Red Energy). Results stored on
    the coordinator and exposed via the alternatives sensor (Phase 3.1
    commit 6). Cheap-rank only for now; deep-rank by HA consumption replay
    arrives in Phase 3.2.
  fields:
    top_k:
      name: Top K
      description: Number of cheapest alternatives to keep (default 20)
      required: false
      default: 20
      example: 20
      selector:
        number:
          min: 1
          max: 100
          mode: slider
