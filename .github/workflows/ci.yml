name: CI

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  ci:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true

      - name: Install dev toolchain
        # Single dependency source — pyproject [dependency-groups].dev.
        # requirements.txt was removed; uv is the only resolver now.
        run: uv sync --group dev

      - name: Ruff lint
        run: uv run ruff check .

      - name: Ruff format check
        run: uv run ruff format --check .

      - name: Type check (ty)
        run: uv run ty check
        # ty (config in pyproject [tool.ty]) resolves the real HA installed by
        # pytest-homeassistant-custom-component, so it type-checks against actual
        # HA APIs — no follow_imports=skip workaround. Replaced mypy 2026-05-28.

      - name: Pytest
        run: uv run pytest --cov=custom_components/pricehawk --cov-fail-under=70 --cov-report=term-missing
        # Floor is 70% (tree sits at ~71%). sensor.py / config_flow.py /
        # coordinator.py remain low because they need the real HA harness
        # (pytest-homeassistant-custom-component, -p homeassistant) — raising
        # them further is tracked separately; this gate prevents regression
        # below the achieved pure-logic coverage.

  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Hassfest
        uses: home-assistant/actions/hassfest@868e6cb4607727d764341a158d98872cd63fa658 # master

      - name: HACS
        uses: hacs/action@d556e736723344f83838d08488c983a15381059a # 22.5.0
        with:
          category: integration

  security:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Gitleaks
        uses: gitleaks/gitleaks-action@ff98106e4c7b2bc287b24eaf42907196329070c7 # v2.3.9
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
