name: CI

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  ci:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install
        run: pip install -r requirements.txt

      - name: Ruff lint
        run: ruff check .

      # ruff format --check intentionally NOT enabled here. The current tree has
      # ~16 files that would be reformatted; tracked in #176 (format tree + re-enable).

      - name: Mypy
        run: mypy --ignore-missing-imports custom_components/pricehawk
        # --ignore-missing-imports preserves the previous workflow's behaviour while
        # HA stubs aren't installed for type-checking. Tracked in #176 (install
        # pytest-homeassistant-custom-component + drop the flag).

      - name: Pytest with coverage gate
        run: pytest --cov=custom_components/pricehawk --cov-fail-under=70 --cov-report=term-missing

  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Hassfest
        uses: home-assistant/actions/hassfest@868e6cb4607727d764341a158d98872cd63fa658 # master

      - name: HACS
        uses: hacs/action@d556e736723344f83838d08488c983a15381059a # 22.5.0
        with:
          category: integration

  security:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Gitleaks
        uses: gitleaks/gitleaks-action@ff98106e4c7b2bc287b24eaf42907196329070c7 # v2.3.9
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
