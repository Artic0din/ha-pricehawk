name: CI

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  ci:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install
        run: pip install -r requirements.txt

      - name: Ruff lint
        run: ruff check .

      - name: Ruff format check
        run: ruff format --check .

      - name: Mypy
        run: mypy
        # Config in mypy.ini: HA + OpenElectricity follow_imports=skip (treated as
        # Any — runtime-validated inside HA, not at type-check time), our own logic
        # fully checked.

      - name: Pytest
        run: pytest --cov=custom_components/pricehawk --cov-report=term-missing
        # No --cov-fail-under gate yet — current coverage is ~48% (sensor.py + coordinator.py
        # both untested). Tracked in #176 (raise coverage above 70% + re-enable gate).

  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Hassfest
        uses: home-assistant/actions/hassfest@868e6cb4607727d764341a158d98872cd63fa658 # master

      - name: HACS
        uses: hacs/action@d556e736723344f83838d08488c983a15381059a # 22.5.0
        with:
          category: integration

  security:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Gitleaks
        uses: gitleaks/gitleaks-action@ff98106e4c7b2bc287b24eaf42907196329070c7 # v2.3.9
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
