name: CI

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  ci:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
        with:
          persist-credentials: false

      - uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6
        with:
          python-version: "3.12"
          cache: pip

      - name: Install
        run: pip install -r requirements.txt

      - name: Ruff lint
        run: ruff check .

      # ruff format --check intentionally NOT enabled here. The current tree has
      # ~16 files that would be reformatted; tracked in #176 (format tree + re-enable).

      - name: Mypy
        run: mypy
        # Config is in mypy.ini at repo root: scope = custom_components/pricehawk,
        # ignore_missing_imports = True (HA stubs not installed),
        # explicit_package_bases + namespace_packages to disambiguate package
        # discovery. Tracked in #176 (install pytest-homeassistant-custom-component
        # + tighten config + drop ignore_missing_imports).

      - name: Pytest
        run: pytest --cov=custom_components/pricehawk --cov-report=term-missing
        # No --cov-fail-under gate yet — current coverage is ~48% (sensor.py + coordinator.py
        # both untested). Tracked in #176 (raise coverage above 70% + re-enable gate).

  validate:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
        with:
          persist-credentials: false

      - name: Hassfest
        uses: home-assistant/actions/hassfest@868e6cb4607727d764341a158d98872cd63fa658 # master

      - name: HACS
        uses: hacs/action@d556e736723344f83838d08488c983a15381059a # 22.5.0
        with:
          category: integration

  security:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
        with:
          persist-credentials: false
          fetch-depth: 0

      - name: Gitleaks
        uses: gitleaks/gitleaks-action@ff98106e4c7b2bc287b24eaf42907196329070c7 # v2.3.9
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
