name: Security Scan

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  gitleaks:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: gitleaks/gitleaks-action@dcedce43c6f43de0b836d1fe38946645c9c638dc # v2
        env:
          GITHUB_TOKEN: ${{ github.token }}

  # ``dependency-review`` removed 2026-05-24: ``actions/dependency-review-action``
  # requires the GitHub "Dependency graph" repo setting to be enabled, which
  # this repo does not have on. The job failed on every PR with
  # ``Dependency review is not supported on this repository``. Re-enable
  # after toggling Settings → Code, planning, automation → Code security
  # → Dependency graph. Until then, ``gitleaks`` provides the secret-leak
  # surface and HACS validation provides the structural surface.
