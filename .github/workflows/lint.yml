name: Lint

on:
  pull_request:
    # 2026-05-25: dropped legacy ``develop`` (never existed as a real
    # branch). Same dead-alias issue retro-review #103 surfaced.
    branches: [main, dev]
  push:
    branches: [main]

permissions:
  contents: read
  pull-requests: write
  checks: write

jobs:
  # ── Detect which stacks are present ────────────────────────────────────────
  detect:
    name: Detect Stack
    runs-on: ubuntu-latest
    timeout-minutes: 2
    outputs:
      nextjs: ${{ steps.detect.outputs.nextjs }}
      swift: ${{ steps.detect.outputs.swift }}
      python: ${{ steps.detect.outputs.python }}
    steps:
      - uses: actions/checkout@v4
      - id: detect
        run: |
          echo "nextjs=$(test -f package.json && ls next.config.* 2>/dev/null && echo true || echo false)" >> $GITHUB_OUTPUT
          echo "swift=$(ls *.swift *.xcodeproj Package.swift 2>/dev/null | head -1 | grep -q . && echo true || echo false)" >> $GITHUB_OUTPUT
          echo "python=$(test -f requirements.txt || test -f pyproject.toml || test -f app.py && echo true || echo false)" >> $GITHUB_OUTPUT

  # ── Next.js / TypeScript ───────────────────────────────────────────────────
  lint-nextjs:
    name: ESLint + TypeScript
    needs: detect
    if: needs.detect.outputs.nextjs == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      - run: npm ci

      - name: ESLint
        run: npm run lint 2>&1 | tee eslint-output.txt
        continue-on-error: true

      - name: TypeScript
        run: npx tsc --noEmit 2>&1 | tee tsc-output.txt
        continue-on-error: true

      - name: Fail if errors
        run: |
          ESLINT_ERRORS=$(grep -c "error" eslint-output.txt 2>/dev/null || echo 0)
          TSC_ERRORS=$(grep -c "error TS" tsc-output.txt 2>/dev/null || echo 0)
          if [ "$ESLINT_ERRORS" -gt 0 ] || [ "$TSC_ERRORS" -gt 0 ]; then
            echo "❌ Lint failed: $ESLINT_ERRORS ESLint errors, $TSC_ERRORS TypeScript errors"
            cat eslint-output.txt
            cat tsc-output.txt
            exit 1
          fi
          echo "✅ ESLint and TypeScript clean"

      - name: Prettier check
        run: |
          if npx prettier --check . 2>/dev/null; then
            echo "✅ Prettier clean"
          else
            echo "⚠️ Prettier formatting issues found (run: npx prettier --write .)"
            exit 1
          fi

  # ── Swift ──────────────────────────────────────────────────────────────────
  lint-swift:
    name: SwiftLint
    needs: detect
    if: needs.detect.outputs.swift == 'true'
    runs-on: macos-15
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4

      - name: Install SwiftLint
        run: brew install swiftlint

      - name: SwiftLint strict
        run: |
          swiftlint --strict --reporter github-actions-logging 2>&1 | tee swiftlint-output.txt
          EXIT_CODE=$?
          VIOLATIONS=$(grep -c "error:" swiftlint-output.txt 2>/dev/null || echo 0)
          if [ $EXIT_CODE -ne 0 ]; then
            echo "❌ SwiftLint: $VIOLATIONS violations"
            exit 1
          fi
          echo "✅ SwiftLint clean"

      - name: Check for force unwraps without justification
        run: |
          UNJUSTIFIED=$(grep -rn '!' --include='*.swift' . \
            | grep -v '// JUSTIFIED:' \
            | grep -v '//.*!' \
            | grep -v 'test\|Test\|spec\|Spec\|mock\|Mock' \
            | grep -v 'node_modules\|.build\|Pods' \
            | grep -E '!\s*$|!\.' \
            | wc -l | tr -d ' ')
          if [ "$UNJUSTIFIED" -gt 0 ]; then
            echo "⚠️ $UNJUSTIFIED force unwrap(s) without // JUSTIFIED: comment:"
            grep -rn '!' --include='*.swift' . \
              | grep -v '// JUSTIFIED:' \
              | grep -v '//.*!' \
              | grep -v 'test\|Test\|mock\|Mock' \
              | grep -v 'node_modules\|.build\|Pods' \
              | grep -E '!\s*$|!\.'
          else
            echo "✅ No unjustified force unwraps"
          fi

  # ── Python ─────────────────────────────────────────────────────────────────
  lint-python:
    name: Ruff + MyPy + Bandit
    needs: detect
    if: needs.detect.outputs.python == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: read
      pull-requests: write    # reviewdog inline comments
      checks: write           # reviewdog Checks API reporter
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0    # reviewdog diff needs history
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'

      - uses: reviewdog/action-setup@v1
        with:
          reviewdog_version: latest

      - name: Install linters
        run: |
          pip install ruff mypy bandit 2>/dev/null
          if [ -f requirements.txt ]; then pip install -r requirements.txt 2>/dev/null || true; fi

      # Ruff → reviewdog (rdjson via ruff's native --output-format).
      # On PR events use github-pr-review (inline comments), on push events
      # use github-check (Checks API annotation). fail-level=error makes
      # the workflow red on ruff errors only — warnings stay informational.
      - name: Ruff (reviewdog)
        env:
          REVIEWDOG_GITHUB_API_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REPORTER: ${{ github.event_name == 'pull_request' && 'github-pr-review' || 'github-check' }}
        run: |
          set -o pipefail
          ruff check --output-format=json . > ruff.json || true
          cat ruff.json | reviewdog \
            -f=rdjson \
            -name="ruff" \
            -reporter="$REPORTER" \
            -filter-mode=added \
            -fail-level=error \
            < <(jq -r '.[] | {
              source: {name: "ruff"},
              severity: (if .fix then "WARNING" else "ERROR" end),
              location: {path: .filename, range: {start: {line: .location.row, column: .location.column}}},
              message: ("[" + .code + "] " + .message)
            }' ruff.json | jq -cs '{source: {name: "ruff"}, diagnostics: .}')

      # MyPy → reviewdog (efm format: file:line:col: message).
      # ``--explicit-package-bases`` resolves the "duplicate module conftest"
      # error from having conftest.py in both repo root + tests/. Without
      # it, mypy treats both as top-level ``conftest`` and conflicts.
      - name: MyPy (reviewdog)
        env:
          REVIEWDOG_GITHUB_API_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REPORTER: ${{ github.event_name == 'pull_request' && 'github-pr-review' || 'github-check' }}
        run: |
          set -o pipefail
          mypy . --ignore-missing-imports --explicit-package-bases --show-column-numbers --no-error-summary 2>&1 | tee mypy.txt || true
          cat mypy.txt | reviewdog \
            -efm="%f:%l:%c: %t%*[^:]: %m" \
            -name="mypy" \
            -reporter="$REPORTER" \
            -filter-mode=added \
            -fail-level=error

      # Bandit → reviewdog (efm with bandit's default format).
      - name: Bandit (reviewdog)
        env:
          REVIEWDOG_GITHUB_API_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REPORTER: ${{ github.event_name == 'pull_request' && 'github-pr-review' || 'github-check' }}
        run: |
          set -o pipefail
          bandit -r . -ll -x ./tests --format custom --msg-template "{abspath}:{line}: {severity}: {test_id}: {msg}" 2>&1 | tee bandit.txt || true
          cat bandit.txt | reviewdog \
            -efm="%f:%l: %t%*[^:]: %*[^:]: %m" \
            -name="bandit" \
            -reporter="$REPORTER" \
            -filter-mode=added \
            -fail-level=error

      - name: Check for bare except clauses
        run: |
          BARE=$(grep -rn "except:" --include='*.py' . \
            | grep -v 'test\|Test\|#.*except' \
            | grep -v node_modules \
            | wc -l | tr -d ' ')
          if [ "$BARE" -gt 0 ]; then
            echo "❌ $BARE bare except: clause(s) found — always catch specific exceptions:"
            grep -rn "except:" --include='*.py' . | grep -v 'test\|Test\|#.*except'
            exit 1
          fi
          echo "✅ No bare except: clauses"

      - name: Check for missing type hints on public functions
        run: |
          MISSING=$(grep -rn "^def " --include='*.py' . \
            | grep -v 'test\|Test\|__\|#' \
            | grep -v node_modules \
            | grep -v ") ->" \
            | wc -l | tr -d ' ')
          if [ "$MISSING" -gt 0 ]; then
            echo "⚠️ $MISSING public function(s) missing return type hints:"
            grep -rn "^def " --include='*.py' . \
              | grep -v 'test\|Test\|__\|#' \
              | grep -v node_modules \
              | grep -v ") ->"
            exit 1
          fi
          echo "✅ All public functions have return type hints"

  # ── Universal: secrets scan ────────────────────────────────────────────────
  lint-secrets:
    name: Secret Detection
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
