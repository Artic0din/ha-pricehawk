name: Docs Check

on:
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  changelog:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: CHANGELOG.md modified
        run: |
          if ! git diff --name-only origin/main...HEAD | grep -q "^CHANGELOG.md$"; then
            echo "::error::CHANGELOG.md must be updated in every PR (Keep a Changelog format under [Unreleased])"
            exit 1
          fi
          echo "✓ CHANGELOG.md updated"
