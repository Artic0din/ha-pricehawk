name: Rate Update
description: Report new or changed GloBird Energy rates
title: "[Rates]: "
labels: ["rates", "data"]
body:
  - type: markdown
    attributes:
      value: |
        GloBird publishes new Energy Fact Sheets periodically. If you spot updated rates, please share the details so we can update the defaults.
  - type: dropdown
    id: plan
    attributes:
      label: GloBird plan
      options:
        - ZEROHERO
        - FOUR4FREE
        - BOOST
        - GLOSAVE
        - Other / New plan
    validations:
      required: true
  - type: input
    id: fact_sheet_id
    attributes:
      label: Fact sheet reference
      description: The GLO reference number from the PDF (e.g. GLO731031MR).
      placeholder: "GLO731031MR"
    validations:
      required: true
  - type: input
    id: effective_date
    attributes:
      label: Effective date
      description: When do these rates take effect?
      placeholder: "2026-07-01"
    validations:
      required: true
  - type: textarea
    id: rates
    attributes:
      label: Rate details
      description: |
        List the new rates. Include:
        - Daily supply charge (c/day)
        - Import rates by period (c/kWh)
        - Export rates by period (c/kWh)
        - Any changes to time windows
        - Any changes to incentives
    validations:
      required: true
  - type: textarea
    id: additional
    attributes:
      label: Additional context
      description: Link to the fact sheet PDF if available online, or attach it here.
